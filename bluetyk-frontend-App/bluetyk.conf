<VirtualHost *:80>
    ServerAdmin admin@bluetyk.in
    ServerName bluetyk.in
    ServerAlias www.bluetyk.in
    DocumentRoot /var/www/html/bluetyk/dist
    DirectoryIndex index.php index.html
    <Directory /var/www/html/bluetyk/dist>
        Options -Indexes +FollowSymLinks +MultiViews
        AllowOverride All
    </Directory>
	AddType application/javascript .js
    	AddType text/css .css


</VirtualHost>

